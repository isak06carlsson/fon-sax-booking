services:
  postgres:
    image: postgres:16-alpine
    container_name: fon-sax-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fonsax
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - fon-sax-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fonsax"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  fon-sax-postgres-data: